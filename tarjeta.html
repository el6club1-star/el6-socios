<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socio - Club Privado El 6</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --gold: #d4af37;
            --success: #15803d;
        }
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        /* DISEÑO BASE DE LA TARJETA DEL CLUB */
        .card-vip {
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            padding: 25px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            transition: all 0.5s ease; /* Transición suave al cambiar de color */
            border: 2px solid transparent;
        }

        /* --- CLONACIÓN EXACTA DE COLORES DESDE EL ORDENADOR --- */
        
        /* 1. ESTÁNDAR */
        .card-vip.diseno-estandar { 
            background: linear-gradient(135deg, #2c3e50, #000000); 
            border-color: #7f8c8d; 
        }
        .card-vip.diseno-estandar .texto-titulo-club, 
        .card-vip.diseno-estandar .id-grande { color: #ffffff !important; }

        /* 2. SOCIO PLUS */
        .card-vip.diseno-socio-plus { 
            background: linear-gradient(135deg, #1e3a8a, #000000); 
            border-color: #3b82f6; 
        }
        .card-vip.diseno-socio-plus .texto-titulo-club, 
        .card-vip.diseno-socio-plus .id-grande { color: #ffffff !important; }

        /* 3. VIP PLATA */
        .card-vip.diseno-vip-plata { 
            background: linear-gradient(135deg, #bdc3c7, #2c3e50); 
            border-color: #fff; 
        }
        /* Para que se lea bien en plata, forzamos textos oscuros o claros según tu estética */
        .card-vip.diseno-vip-plata .texto-titulo-club { color: #ffffff !important; }
        .card-vip.diseno-vip-plata .id-grande { color: #ffffff !important; }

        /* 4. VIP GOLD */
        .card-vip.diseno-vip-gold { 
            background: linear-gradient(135deg, #d4af37, #000000); 
            border-color: #f1c40f; 
        }
        .card-vip.diseno-vip-gold .texto-titulo-club, 
        .card-vip.diseno-vip-gold .id-grande { color: #ffffff !important; }

        /* 5. ÉLITE */
        .card-vip.diseno-elite { 
            background: linear-gradient(135deg, #000000, #434343); 
            border: 2px solid var(--gold); 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); 
        }
        .card-vip.diseno-elite .texto-titulo-club { color: var(--gold) !important; }
        .card-vip.diseno-elite .id-grande { color: #ffffff !important; }


        /* Sello flotante de PAGADO */
        #selloPagado {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--success);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(21, 128, 61, 0.3);
            display: none;
            z-index: 10;
        }

        #qr-space {
            background: white;
            padding: 10px;
            border-radius: 12px;
            display: inline-block;
            margin: 15px auto;
        }

        #qr-space img {
            display: block;
            max-width: 150px;
            height: auto;
        }

        #card-consumos {
            margin: 15px 0;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #previewFirmaSocio {
            max-height: 40px;
            display: block;
            margin-top: 5px;
            filter: invert(1) brightness(2);
            opacity: 0.8;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
        }

        #pantallaCarga {
            text-align: center;
            color: var(--gold);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="pantallaCarga">Leyendo credenciales de socio de El 6...</div>

    <div class="card-vip" id="cardMain" style="display: none;">
        <div id="selloPagado">PAGADO ✅</div>
        <h2 class="texto-titulo-club" style="font-size:16px; margin:0; letter-spacing: 1px; transition: color 0.5s;">CLUB PRIVADO EL 6</h2>
        
        <div style="font-size:14px; margin-top:5px; opacity:0.8;">Nº <span id="card-id" class="id-grande" style="font-size:32px; font-weight:900; transition: color 0.5s;"></span></div>
        <div id="card-categoria-texto" style="font-size:12px; font-weight:bold; letter-spacing:2px; text-transform:uppercase; margin-bottom:5px; opacity:0.9;"></div>
        
        <div id="qr-space"></div>
        
        <div id="card-consumos">Cargando consumos actuales...</div>
        
        <div style="text-align:left; font-size:11px; border-top:1px solid rgba(255,255,255,0.2); padding-top:10px; margin-top: 15px;">
            <div class="info-row"><span>SOCIO:</span><span id="card-nom" style="font-weight: bold;">---</span></div>
            <div class="info-row"><span>DNI:</span><span id="card-dni" style="font-weight: bold;">---</span></div>
            <div class="info-row"><span>CATEGORÍA:</span><span id="card-cat-abajo" style="font-weight: bold;">---</span></div>
            
            <div style="margin-top: 10px;">
                <span style="font-size: 10px; opacity: 0.6; display: block;">FIRMA CONTRATO DIGITAL:</span>
                <img id="previewFirmaSocio" src="" alt="Firma">
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://rmskjegarvntuqpfzfbm.supabase.co';
        const supabaseKey = 'sb_publishable_hEqxPZNGDxpNZEnz7hrymg_cL8GvwHK';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
        const NOMBRE_TABLA = 'socios';

        const parametros = new URLSearchParams(window.location.search);
        const idSocioUrl = parametros.get('id');

        async function cargarTarjetaDigital() {
            if (!idSocioUrl) {
                document.getElementById('pantallaCarga').innerText = "❌ Enlace de tarjeta no válido.";
                return;
            }

            try {
                const { data: socio, error } = await _supabase
                    .from(NOMBRE_TABLA)
                    .select('*')
                    .eq('id', idSocioUrl)
                    .single();

                if (error || !socio) {
                    document.getElementById('pantallaCarga').innerText = "❌ No se encontró la tarjeta del socio.";
                    return;
                }

                document.getElementById('pantallaCarga').style.display = 'none';
                document.getElementById('cardMain').style.display = 'block';

                // CORRECCIÓN DEL NÚMERO: Limpio, sin ceros por delante (Ej: 4)
                document.getElementById('card-id').innerText = socio.id || '';
                
                document.getElementById('card-categoria-texto').innerText = socio.cat || 'ESTÁNDAR';
                document.getElementById('card-nom').innerText = socio.nombre || '---';
                document.getElementById('card-dni').innerText = socio.dni || '---';
                document.getElementById('card-cat-abajo').innerText = (socio.cat || 'ESTÁNDAR').toUpperCase();

                // --- ASIGNACIÓN AUTOMÁTICA DE DISEÑO CLONADO ---
                const tarjetaContenedor = document.getElementById('cardMain');
                tarjetaContenedor.classList.remove('diseno-estandar', 'diseno-socio-plus', 'diseno-vip-plata', 'diseno-vip-gold', 'diseno-elite');
                
                const catSocio = (socio.cat || '').toLowerCase().trim();

                if (catSocio === 'estándar' || catSocio === 'estandar') {
                    tarjetaContenedor.classList.add('diseno-estandar');
                } else if (catSocio === 'socio-plus' || catSocio === 'socio plus') {
                    tarjetaContenedor.classList.add('diseno-socio-plus');
                } else if (catSocio === 'vip-plata' || catSocio === 'plata') {
                    tarjetaContenedor.classList.add('diseno-vip-plata');
                } else if (catSocio === 'vip-gold' || catSocio === 'vip-oro' || catSocio === 'oro') {
                    tarjetaContenedor.classList.add('diseno-vip-gold');
                } else if (catSocio === 'elite') {
                    tarjetaContenedor.classList.add('diseno-elite');
                } else {
                    tarjetaContenedor.classList.add('diseno-estandar'); // Por defecto si hay dudas
                }

                if (socio.firma) {
                    document.getElementById('previewFirmaSocio').src = socio.firma;
                    document.getElementById('previewFirmaSocio').style.display = 'block';
                } else {
                    document.getElementById('previewFirmaSocio').style.display = 'none';
                }

                const urlTarjeta = window.location.href;
                document.getElementById('qr-space').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(urlTarjeta)}" alt="QR de acceso">`;

                let pagadoValido = socio.pago_realizado;
                if (socio.hora_pago) {
                    const hPago = new Date(socio.hora_pago);
                    const hAgora = new Date();
                    const diff = (hAgora - hPago) / (1000 * 60 * 60);
                    if (diff > 5) pagadoValido = false; 
                }

                if (pagadoValido) {
                    document.getElementById('selloPagado').style.display = 'block';
                } else {
                    document.getElementById('selloPagado').style.display = 'none';
                }

                let textoConsumos = "Sin consumiciones pendientes";
                if (socio.copas || socio.cervezas || socio.chupitos) {
                    let deSglos = [];
                    if(socio.copas) deSglos.push(`🥃 ${socio.copas} Copas`);
                    if(socio.cervezas) deSglos.push(`🍺 ${socio.cervezas} Cervezas`);
                    if(socio.chupitos) deSglos.push(`🧪 ${socio.chupitos} Chupitos`);
                    textoConsumos = deSglos.join(' | ');
                }
                document.getElementById('card-consumos').innerText = textoConsumos;

            } catch (e) {
                console.error(e);
                document.getElementById('pantallaCarga').innerText = "❌ Error al conectar con la base de datos.";
            }
        }

        cargarTarjetaDigital();
        setInterval(cargarTarjetaDigital, 4000);
    </script>
</body>
</html>
