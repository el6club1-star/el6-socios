<script>
    const _supabase = supabase.createClient('https://rmskjegarvntuqpfzfbm.supabase.co', 'sb_publishable_hEqxPZNGDxpNZEnz7hrymg_cL8GvwHK');
    const urlParams = new URLSearchParams(window.location.search);
    const dniSocio = urlParams.get('dni');

    async function cargar() {
        if(!dniSocio) return;
        const { data } = await _supabase.from('socios').select('*').eq('dni', dniSocio).single();
        if(data) {
            const card = document.querySelector('.card');
            const cat = data.cat;

            // --- DISEÑOS SEGÚN CATEGORÍA ---
            if(cat === "VIP Gold") {
                card.style.background = "linear-gradient(135deg, #d4af37 0%, #f9f295 50%, #d4af37 100%)";
                card.style.color = "black";
            } else if(cat === "VIP Plata") {
                card.style.background = "linear-gradient(135deg, #a0a0a0 0%, #e0e0e0 50%, #a0a0a0 100%)";
                card.style.color = "black";
            } else if(cat === "Elite") {
                card.style.background = "linear-gradient(135deg, #0f172a 0%, #1e40af 100%)";
                card.style.color = "white";
            } else if(cat === "Socio Plus") {
                card.style.background = "linear-gradient(135deg, #064e3b 0%, #10b981 100%)";
                card.style.color = "white";
            } else {
                card.style.background = "#000"; // Estándar
                card.style.color = "white";
            }

            document.getElementById('nom').innerText = data.nombre;
            document.getElementById('dni').innerText = data.dni;
            document.getElementById('puntos').innerText = data.consumiciones || 0;
            document.getElementById('qr-space').innerHTML = "";
            new QRious({ element: document.getElementById('qr-space').appendChild(document.createElement('canvas')), value: data.dni, size: 180 });
        }
    }
    cargar();
    setInterval(cargar, 5000);
</script>
